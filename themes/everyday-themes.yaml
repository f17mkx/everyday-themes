# Everyday HA Theme Bundle - Iter-3 final picks (2026-05-08)
#
# Themes:
#   1. "Domaine Velvet"      - Yama-Chopan Editorial (Gold #745108) - kept as alt
#   2. "Glass"               - Hemma upstream (read-only ref)
#   3. "everyday"           - Iter-3 picked: dark = Vegas Lila (#6b2d8f brand + #FF7E3A active)
#                              light = Wallpaper Mint (#001848 brand + #58bcb4 active)
#                              Token-System Layer 1+2, MonoDev font.
#   4. "everyday-citrus"     - Iter-3 NEW: Citrus Fizz light only (#6b2d8f brand + #ff5e3d active + warm cream surface)
#   5. "Glass Superpro"      - history-reference (alte Synthwave-Palette)
