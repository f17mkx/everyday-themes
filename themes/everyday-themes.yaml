    \ normal; font-display: swap;\n}\n"
  card-mod-card: "/* KORREKTUR 2026-04-22 12:15 nach Forum-Research:\n   Mushroom's .primary/.secondary leben im SHADOW DOM\
    \ von\n   `mushroom-state-info`. Ein Selector wie `ha-card .primary` aus dem\n   Theme-card-mod kann das Shadow DOM NICHT\
    \ erreichen ohne `$`-Piercing.\n   Deshalb sind font-size + sans-serif hier global sinnlos - muss per-\n   card mit MAP-form\
    \ `mushroom-state-info$: |` in den Anchors laufen.\n   Theme bleibt simpel: nur ha-card-Properties die via Cascade (Inheritance)\n\
    \   auch ins Shadow DOM kommen. font-family Domaine inherit → primary.\n   Quelle: HA-Community-Forum 600472 + piitaya/lovelace-mushroom\n\
    \   state-info.ts Source. */\nha-card {\n  font-family: \"Domaine Display Narrow\", Georgia, serif !important;\n  border-radius:\
    \ 33px !important;\n  box-shadow: 0px 2px 2px 0px rgba(0, 0, 0, 0.76) !important;\n}\n"
  app-header-background-color: transparent
